<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brillamur - Solicita tu presupuesto</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-forms.css">
</head>
<body>
    
    <main class="main-window">
        <section id="contact-page-section">
            <div class="contact-page-container">
                
                <div class="form-card">
                    <h2 class="form-title">Solicita tu presupuesto</h2>
                    <p class="form-subtitle">Completa el formulario y nos pondremos en contacto contigo en menos de 24 horas</p>
                    
                    <form class="main-form" action="#" method="POST">
                        
                        <div class="form-row">
                            <div class="form-group-half">
                                <label for="name">Nombre completo *</label>
                                <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                            </div>
                            <div class="form-group-half">
                                <label for="email">Email *</label>
                                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group-half">
                                <label for="phone">Teléfono *</label>
                                <input type="tel" id="phone" name="phone" placeholder="+34 600 000 000" required>
                            </div>
                            <div class="form-group-half">
                                <label for="service">Servicio que necesitas *</label>
                                <select id="service" name="service" required>
                                    <option value="" disabled selected>Selecciona un servicio</option>
                                    <option value="1">Limpieza de Cristales</option>
                                    <option value="2">Mantenimiento de Oficinas</option>
                                    <option value="3">Limpieza de Fachadas</option>
                                    <option value="4">Servicio para Particulares</option>
                                    <option value="5">Otro servicio</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group-full">
                            <label for="location">Ubicación / Ciudad *</label>
                            <input type="text" id="location" name="location" placeholder="¿Dónde necesitas el servicio?" required>
                        </div>

                        <div class="form-group-full">
                            <label for="details">Cuéntanos más sobre tu proyecto</label>
                            <textarea id="details" name="details" placeholder="Describe el tipo de servicio que necesitas, frecuencia, m² aproximados, etc."></textarea>
                        </div>

                        <button type="submit" class="submit-button">
                            <div class="icon-white-placeholder"></div>
                            Enviar solicitud
                        </button>
                        
                        <p class="privacy-text">Al enviar este formulario aceptas nuestra política de privacidad</p>

                    </form>
                </div>

                <div class="contact-sidebar" id="sidebar-container">
                    </div>

            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
    <script src="js/forms.js"></script>
</body>
</html>
